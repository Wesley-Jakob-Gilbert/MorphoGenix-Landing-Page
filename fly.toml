# fly.toml app configuration file generated for morphogenix-landing-page-1-2pra on 2026-04-25T03:05:58Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'morphogenix-landing-page-1-2pra'
primary_region = 'dfw'

[build]

[env]
  APP_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
